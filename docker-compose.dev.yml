services:
  frontend:
    build:
      context: ./frontend
      target: deps
    container_name: fin_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    command: npm run dev
    depends_on:
      - api
    restart: unless-stopped
